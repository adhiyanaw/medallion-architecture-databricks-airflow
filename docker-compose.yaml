version: '3'
services:
  postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${PORT}:${PORT}"
    # Inside your postgres service, you might want to add this:
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  # NEW: This service initializes the DB and creates the user automatically
  airflow-init:
    image: apache/airflow:2.9.0
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
    command: >
      bash -c "airflow db migrate &&
      airflow users create --username admin --password admin --firstname Airflow --lastname Admin --role Admin --email admin@example.com"

  airflow-webserver:
    image: apache/airflow:2.9.0
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__FERNET_KEY=9siQLivFXrZFtMo-_Wgl2GPJtaLMNZa6plvNyWC5anw=
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
      - AIRFLOW__WEBSERVER__SECRET_KEY=lVn8uRggRqKlpiFzfQQJRVIcC9ZCIInuOkXvJB2eTXY=
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__TEST_CONNECTION=Enabled
      - AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION=True
      - RAW_DATA_PATH=/opt/airflow/data/raw

    volumes:
      - ./dags:/opt/airflow/dags
      - ./data:/opt/airflow/data

    ports:
      - "8080:8080"
    command: webserver

  airflow-scheduler:
    image: apache/airflow:2.9.0
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__FERNET_KEY=9siQLivFXrZFtMo-_Wgl2GPJtaLMNZa6plvNyWC5anw=
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
      - AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION=True
      - AIRFLOW__WEBSERVER__SECRET_KEY=lVn8uRggRqKlpiFzfQQJRVIcC9ZCIInuOkXvJB2eTXY=
      - RAW_DATA_PATH=/opt/airflow/data/raw
    volumes:
      - ./dags:/opt/airflow/dags
      - ./data:/opt/airflow/data

    command: scheduler
volumes:
  postgres_data: # This defines the persistent storage
